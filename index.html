<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Student Profile - The Indian Heights School</title>
  <style>
    /* Reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #f0f4fa 0%, #d9e2ef 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    /* Main card – clean, premium, with sash accent */
    .card {
      max-width: 440px;
      width: 100%;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 35px -8px rgba(0, 20, 40, 0.25), 0 5px 10px -3px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      position: relative;
      transition: transform 0.2s ease;
      animation: cardFade 0.4s ease-out;
    }

    /* Sash effect: diagonal stripe on top right */
    .card::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, transparent 50%, #c5a028 50%);
      z-index: 1;
      pointer-events: none;
    }

    /* Small graduation cap on the sash */
    .card::after {
      content: "🎓";
      position: absolute;
      top: 12px;
      right: 20px;
      font-size: 28px;
      color: #ffffff;
      text-shadow: 1px 2px 3px rgba(0,0,0,0.2);
      z-index: 2;
      pointer-events: none;
      transform: rotate(15deg);
    }

    @keyframes cardFade {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* School header – rich blue with gold accent */
    .school-header {
      background: #0b2b4f;  /* deep navy */
      color: white;
      padding: 24px 20px 20px;
      text-align: center;
      border-bottom: 5px solid #c5a028;
    }

    .school-name {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .school-address {
      font-size: 14px;
      opacity: 0.9;
      font-weight: 400;
    }

    /* Photo container – adapts to tall images */
    .photo-container {
      margin: 20px 20px 10px;
      border-radius: 24px;
      overflow: hidden;
      background: #f2f2f2;
      box-shadow: 0 8px 18px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      max-height: 60vh;           /* limits height on large screens */
    }

    .photo {
      width: 100%;
      height: auto;
      max-height: 60vh;
      object-fit: contain;        /* ensures full photo is visible */
      display: block;
    }

    .photo-placeholder {
      padding: 40px 20px;
      color: #7a7a7a;
      text-align: center;
      font-size: 16px;
      background: #f7f7f7;
      border-radius: 24px;
      margin: 20px;
    }

    /* Student info */
    .student-name {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin: 12px 20px 4px;
      color: #0b2b4f;
      word-break: break-word;
      line-height: 1.3;
    }

    .student-message {
      font-size: 18px;
      text-align: center;
      margin: 0 20px 20px;
      color: #2c3e50;
      background: #f4f7fc;
      padding: 18px 16px;
      border-radius: 40px;
      font-weight: 400;
      border-left: 4px solid #c5a028;
      border-right: 4px solid #c5a028;
      word-break: break-word;
    }

    /* Footer with ID and subtle sash line */
    .footer {
      font-size: 15px;
      text-align: center;
      color: #6b7a8f;
      padding: 0 20px 22px;
      letter-spacing: 0.4px;
      border-top: 2px dashed #c5a028;
      margin-top: 8px;
      padding-top: 18px;
    }

    /* Loading & error states */
    .loading, .error {
      color: #0b2b4f;
      text-align: center;
      padding: 40px 20px;
      font-size: 18px;
      background: #ffffff;
      border-radius: 28px;
      margin: 20px;
    }
    .error {
      color: #b0003a;
    }
  </style>
</head>
<body>

  <!-- Main profile card -->
  <div class="card">
    <!-- School header (replaces generic "Student Profile") -->
    <div class="school-header">
      <div class="school-name">The Indian Heights School</div>
      <div class="school-address">Sector - 23, Dwarka, New Delhi 110077</div>
    </div>

    <div id="content">
      <!-- Dynamic content loaded by JavaScript -->
      <div class="loading">🎓 Loading profile...</div>
    </div>
  </div>

  <script>
    (function() {
      const studentId = new URLSearchParams(window.location.search).get('id');
      const contentDiv = document.getElementById('content');

      if (!studentId) {
        contentDiv.innerHTML = '<div class="error">❌ Missing student ID</div>';
        return;
      }

      // Fetch the JSON file (adjust path if needed)
      fetch('data/student.json')
        .then(response => {
          if (!response.ok) throw new Error('Network response was not ok');
          return response.json();
        })
        .then(students => {
          // Find student by ID (key "A" as per your JSON)
          const student = students.find(s => s.A == studentId);
          if (!student) throw new Error('Student not found');

          // Build the basic structure with name and message
          contentDiv.innerHTML = `
            <div class="photo-container" id="photoContainer">
              <div class="loading" style="background: none; padding: 30px;">📸 Loading photo...</div>
            </div>
            <div class="student-name">${student.B || 'Student'}</div>
            <div class="student-message">${student.C || 'Congratulations on your achievement! 🎓'}</div>
            <div class="footer">ID: ${studentId}</div>
          `;

          // Photo loading with multiple extensions (prioritize .JPG)
          const extensions = ['JPG', 'jpg', 'PNG', 'png'];
          const photoContainer = document.getElementById('photoContainer');

          function tryImage(ext) {
            return new Promise((resolve, reject) => {
              const img = new Image();
              img.onload = () => resolve(img);
              img.onerror = reject;
              img.src = `images/${studentId}.${ext}`;
            });
          }

          let attempt = Promise.reject();
          extensions.forEach(ext => {
            attempt = attempt.catch(() => tryImage(ext));
          });

          attempt
            .then(img => {
              img.className = 'photo';
              photoContainer.innerHTML = ''; // clear loading
              photoContainer.appendChild(img);
            })
            .catch(() => {
              photoContainer.innerHTML = '<div class="photo-placeholder">📷 No photo available</div>';
            });
        })
        .catch(err => {
          console.error(err);
          contentDiv.innerHTML = '<div class="error">❌ Student not found or data error</div>';
        });
    })();
  </script>
</body>
</html>
