<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>The Indian Heights School – Scholar Profile</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(145deg, #f5f0e7 0%, #e8dfd1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
    }

    /* Star canvas – light, elegant */
    #starCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      opacity: 0.45;
    }

    /* Main card – clean white with subtle gold details */
    .card {
      position: relative;
      z-index: 10;
      max-width: 460px;
      width: 100%;
      background: #ffffff;
      border-radius: 48px 48px 40px 40px;
      box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.2), 0 10px 20px -5px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(212, 175, 55, 0.3) inset;
      overflow: hidden;
      animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* School header – rich, deep navy */
    .school-header {
      background: #0b2545;
      color: white;
      padding: 28px 24px 20px;
      text-align: center;
      border-bottom: 3px solid #c9a03d;
    }

    .school-name {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 0.5px;
      line-height: 1.3;
    }

    .school-address {
      font-size: 14px;
      font-weight: 300;
      color: #ddcba4;
      margin-top: 6px;
    }

    /* "Hat and Sash" ribbon – below header, above photo */
    .hat-sash-ribbon {
      background: #faf6e9;
      padding: 12px 20px;
      text-align: center;
      border-bottom: 1px dashed #c9a03d;
      border-top: 1px solid #c9a03d20;
    }

    .hat-sash-ribbon span {
      font-size: 20px;
      font-weight: 500;
      color: #0b2545;
      background: #e9dbbd;
      padding: 6px 24px;
      border-radius: 60px;
      letter-spacing: 1px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      display: inline-block;
    }

    .hat-sash-ribbon span::before {
      content: "🎓 ";
      font-size: 24px;
      filter: drop-shadow(0 2px 2px #c9a03d);
    }
    .hat-sash-ribbon span::after {
      content: " 🎓";
      font-size: 24px;
      filter: drop-shadow(0 2px 2px #c9a03d);
    }

    /* Photo container */
    .photo-container {
      margin: 20px 24px 12px;
      border-radius: 32px;
      overflow: hidden;
      background: #f2ede3;
      box-shadow: 0 15px 25px -8px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      max-height: 55vh;
      border: 2px solid #ffffff;
      outline: 1px solid #c9a03d40;
    }

    .photo {
      width: 100%;
      height: auto;
      max-height: 55vh;
      object-fit: contain;
      display: block;
    }

    .photo-placeholder {
      color: #8b7a62;
      padding: 50px 20px;
      text-align: center;
      font-size: 18px;
    }

    /* Student details */
    .student-name {
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      margin: 12px 24px 4px;
      color: #0b2545;
      word-break: break-word;
    }

    .student-message {
      font-size: 20px;
      text-align: center;
      margin: 0 24px 20px;
      color: #3a4a5e;
      background: #f8f4ec;
      padding: 18px 18px;
      border-radius: 50px;
      border-left: 4px solid #c9a03d;
      border-right: 4px solid #c9a03d;
      font-weight: 400;
      word-break: break-word;
    }

    /* Download button – elegant gold */
    .download-btn {
      display: block;
      width: calc(100% - 48px);
      margin: 0 24px 24px;
      padding: 16px 10px;
      background: linear-gradient(145deg, #c9a03d, #b48a2c);
      border: none;
      border-radius: 50px;
      color: #0b2545;
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      box-shadow: 0 8px 18px -5px #a67c2e80, 0 2px 0 0 #f3d48b inset;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      border: none;
    }

    .download-btn:active {
      transform: scale(0.97);
      box-shadow: 0 4px 10px -3px #7a5e2b;
    }

    .footer {
      font-size: 15px;
      text-align: center;
      color: #8f9bae;
      padding: 0 24px 28px;
    }

    /* Loading / error */
    .loading, .error {
      text-align: center;
      padding: 40px 20px;
      color: #0b2545;
    }
    .error { color: #b34a4a; }
  </style>
</head>
<body>

  <canvas id="starCanvas"></canvas>

  <div class="card">
    <!-- School header -->
    <div class="school-header">
      <div class="school-name">The Indian Heights School</div>
      <div class="school-address">Sector - 23, Dwarka, New Delhi 110077</div>
    </div>

    <!-- Hat & Sash ribbon (exactly as requested) -->
    <div class="hat-sash-ribbon">
      <span>Hat and Sash</span>
    </div>

    <!-- Dynamic content -->
    <div id="content">
      <div class="loading">🌟 Loading profile...</div>
    </div>
  </div>

  <script>
    // ==================== LIGHTWEIGHT STAR RAIN ====================
    (function() {
      const canvas = document.getElementById('starCanvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let stars = [];

      function initStars() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const starCount = Math.min(70, Math.floor((width * height) / 8000));
        stars = [];
        for (let i = 0; i < starCount; i++) {
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 2.5 + 1,
            speed: Math.random() * 0.4 + 0.2,
            alpha: Math.random() * 0.4 + 0.2,
            color: `hsl(${45 + Math.random()*20}, 70%, 70%)`, // goldish
          });
        }
      }

      function drawStars() {
        ctx.clearRect(0, 0, width, height);
        ctx.shadowColor = '#f0c45a';
        ctx.shadowBlur = 8;

        stars.forEach(s => {
          ctx.globalAlpha = s.alpha;
          ctx.fillStyle = s.color;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
          ctx.fill();

          s.y += s.speed;
          if (s.y > height) {
            s.y = 0;
            s.x = Math.random() * width;
          }
        });

        ctx.shadowBlur = 0;
        requestAnimationFrame(drawStars);
      }

      window.addEventListener('resize', initStars);
      initStars();
      drawStars();
    })();

    // ==================== STUDENT DATA LOADING ====================
    (function() {
      const studentId = new URLSearchParams(window.location.search).get('id');
      const contentDiv = document.getElementById('content');

      if (!studentId) {
        contentDiv.innerHTML = '<div class="error">❌ Missing student ID</div>';
        return;
      }

      fetch('data/student.json')
        .then(r => r.json())
        .then(students => {
          const student = students.find(s => s.A == studentId);
          if (!student) throw new Error('Student not found');

          contentDiv.innerHTML = `
            <div class="photo-container" id="photoContainer">
              <div class="loading" style="background: none;">📸 Loading photo...</div>
            </div>
            <div class="student-name">${student.B || 'Scholar'}</div>
            <div class="student-message">${student.C || 'Congratulations on your achievement! 🎓'}</div>
            <button class="download-btn" id="downloadBtn" style="display: none;">⬇ Download Photo</button>
            <div class="footer">ID: ${studentId}</div>
          `;

          const photoContainer = document.getElementById('photoContainer');
          const downloadBtn = document.getElementById('downloadBtn');
          const extensions = ['JPG', 'jpg', 'PNG', 'png'];
          let loadedImageSrc = null;

          function tryImage(ext) {
            return new Promise((resolve, reject) => {
              const img = new Image();
              img.onload = () => {
                loadedImageSrc = img.src;
                resolve(img);
              };
              img.onerror = reject;
              img.src = `images/${studentId}.${ext}`;
            });
          }

          let attempt = Promise.reject();
          extensions.forEach(ext => {
            attempt = attempt.catch(() => tryImage(ext));
          });

          attempt
            .then(img => {
              img.className = 'photo';
              photoContainer.innerHTML = '';
              photoContainer.appendChild(img);
              downloadBtn.style.display = 'block';
            })
            .catch(() => {
              photoContainer.innerHTML = '<div class="photo-placeholder">📷 No photo available</div>';
              downloadBtn.style.display = 'none';
            });

          downloadBtn.addEventListener('click', function() {
            if (loadedImageSrc) {
              const a = document.createElement('a');
              a.href = loadedImageSrc;
              a.download = `${studentId}_profile.jpg`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
            } else {
              alert('Photo not ready.');
            }
          });
        })
        .catch(err => {
          console.error(err);
          contentDiv.innerHTML = '<div class="error">❌ Student not found</div>';
        });
    })();
  </script>
</body>
</html>
