<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>The Indian Heights School – Scholar Profile</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #f2efe9;  /* soft warm background */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    /* Main card – compact, clean, premium */
    .card {
      max-width: 420px;
      width: 100%;
      background: #ffffff;
      border-radius: 36px 36px 30px 30px;
      box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.15), 0 5px 10px -3px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      transition: transform 0.2s;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* School header – deep navy */
    .school-header {
      background: #0b2545;
      color: white;
      padding: 22px 20px 16px;
      text-align: center;
      border-bottom: 3px solid #c9a03d;
    }

    .school-name {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.3px;
      line-height: 1.2;
    }

    .school-address {
      font-size: 13px;
      font-weight: 300;
      color: #ddcba4;
      margin-top: 5px;
    }

    /* "Hat and Sash" ribbon – compact */
    .hat-sash-ribbon {
      background: #fcf9f2;
      padding: 10px 16px;
      text-align: center;
      border-bottom: 1px solid #c9a03d30;
      border-top: 1px solid #c9a03d20;
    }

    .hat-sash-ribbon span {
      font-size: 18px;
      font-weight: 500;
      color: #0b2545;
      background: #e9dbbd;
      padding: 4px 20px;
      border-radius: 40px;
      letter-spacing: 0.8px;
      display: inline-block;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .hat-sash-ribbon span::before {
      content: "🎓 ";
      font-size: 20px;
    }
    .hat-sash-ribbon span::after {
      content: " 🎓";
      font-size: 20px;
    }

    /* Photo container – smaller, fits tall images */
    .photo-container {
      margin: 16px 20px 8px;
      border-radius: 24px;
      overflow: hidden;
      background: #f2ede3;
      box-shadow: 0 8px 16px -6px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      max-height: 45vh;  /* reduced to lower card height */
      border: 2px solid #ffffff;
      outline: 1px solid #c9a03d30;
    }

    .photo {
      width: 100%;
      height: auto;
      max-height: 45vh;
      object-fit: contain;
      display: block;
    }

    .photo-placeholder {
      color: #8b7a62;
      padding: 35px 16px;
      text-align: center;
      font-size: 16px;
    }

    /* Student details – compact */
    .student-name {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin: 8px 20px 2px;
      color: #0b2545;
      word-break: break-word;
    }

    .student-message {
      font-size: 18px;
      text-align: center;
      margin: 0 20px 16px;
      color: #3a4a5e;
      background: #f8f4ec;
      padding: 14px 14px;
      border-radius: 40px;
      border-left: 3px solid #c9a03d;
      border-right: 3px solid #c9a03d;
      font-weight: 400;
      word-break: break-word;
    }

    /* Download button – sleek gold */
    .download-btn {
      display: block;
      width: calc(100% - 40px);
      margin: 0 20px 18px;
      padding: 14px 10px;
      background: linear-gradient(145deg, #c9a03d, #b48a2c);
      border: none;
      border-radius: 40px;
      color: #0b2545;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      box-shadow: 0 6px 12px -5px #a67c2e80, 0 1px 0 0 #f3d48b inset;
      transition: transform 0.1s;
      cursor: pointer;
      border: none;
    }

    .download-btn:active {
      transform: scale(0.98);
    }

    .footer {
      font-size: 13px;
      text-align: center;
      color: #8f9bae;
      padding: 0 20px 20px;
    }

    /* Loading / error */
    .loading, .error {
      text-align: center;
      padding: 35px 16px;
      color: #0b2545;
    }
    .error { color: #b34a4a; }
  </style>
</head>
<body>

  <div class="card">
    <!-- School header -->
    <div class="school-header">
      <div class="school-name">The Indian Heights School</div>
      <div class="school-address">Sector - 23, Dwarka, New Delhi 110077</div>
    </div>

    <!-- Hat & Sash ribbon -->
    <div class="hat-sash-ribbon">
      <span>Hat and Sash</span>
    </div>

    <!-- Dynamic content -->
    <div id="content">
      <div class="loading">🌟 Loading profile...</div>
    </div>
  </div>

  <script>
    (function() {
      const studentId = new URLSearchParams(window.location.search).get('id');
      const contentDiv = document.getElementById('content');

      if (!studentId) {
        contentDiv.innerHTML = '<div class="error">❌ Missing student ID</div>';
        return;
      }

      fetch('data/student.json')
        .then(r => r.json())
        .then(students => {
          const student = students.find(s => s.A == studentId);
          if (!student) throw new Error('Student not found');

          contentDiv.innerHTML = `
            <div class="photo-container" id="photoContainer">
              <div class="loading" style="background: none;">📸 Loading photo...</div>
            </div>
            <div class="student-name">${student.B || 'Scholar'}</div>
            <div class="student-message">${student.C || 'Congratulations on your achievement! 🎓'}</div>
            <button class="download-btn" id="downloadBtn" style="display: none;">⬇ Download Photo</button>
            <div class="footer">ID: ${studentId}</div>
          `;

          const photoContainer = document.getElementById('photoContainer');
          const downloadBtn = document.getElementById('downloadBtn');
          const extensions = ['JPG', 'jpg', 'PNG', 'png'];
          let loadedImageSrc = null;

          function tryImage(ext) {
            return new Promise((resolve, reject) => {
              const img = new Image();
              img.onload = () => {
                loadedImageSrc = img.src;
                resolve(img);
              };
              img.onerror = reject;
              img.src = `images/${studentId}.${ext}`;
            });
          }

          let attempt = Promise.reject();
          extensions.forEach(ext => {
            attempt = attempt.catch(() => tryImage(ext));
          });

          attempt
            .then(img => {
              img.className = 'photo';
              photoContainer.innerHTML = '';
              photoContainer.appendChild(img);
              downloadBtn.style.display = 'block';
            })
            .catch(() => {
              photoContainer.innerHTML = '<div class="photo-placeholder">📷 No photo available</div>';
              downloadBtn.style.display = 'none';
            });

          downloadBtn.addEventListener('click', function() {
            if (loadedImageSrc) {
              const a = document.createElement('a');
              a.href = loadedImageSrc;
              a.download = `${studentId}_profile.jpg`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
            } else {
              alert('Photo not ready.');
            }
          });
        })
        .catch(err => {
          console.error(err);
          contentDiv.innerHTML = '<div class="error">❌ Student not found</div>';
        });
    })();
  </script>
</body>
</html>
