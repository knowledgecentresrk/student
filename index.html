<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My First Day</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#fff;text-align:center}
.main{padding:15px}
h1{font-size:clamp(20px,5vw,30px)}
h2{font-size:clamp(16px,4vw,22px);color:#ffd700}
.card{margin-top:15px;background:rgba(255,255,255,0.1);border-radius:15px;padding:10px;max-width:95%;margin:auto}
img{width:100%;max-height:80vh;object-fit:contain;background:#000}
.caption{margin-top:10px;font-size:clamp(18px,4.5vw,26px);font-weight:600}
button,a{padding:10px;margin:5px;border:none;border-radius:8px;background:#ff512f;color:#fff;text-decoration:none}
button:disabled{opacity:0.4}
</style>
</head>
<body>

<div class="main">
<h1>The Indian Heights School</h1>
<h2>My First Day</h2>

<div class="card">
  <img id="photo" />
  <div class="caption" id="caption"></div>
  <div>
    <button id="prevBtn" onclick="prevPhoto()">Prev</button>
    <button id="nextBtn" onclick="nextPhoto()">Next</button><br>
    <a id="downloadBtn" download>Download</a>
  </div>
</div>
</div>

<script>
const folderId = new URLSearchParams(window.location.search).get('id') || '1';

let images = [];
let captions = [];
let currentIndex = 0;

function tryLoad(src, success){
  const img = new Image();
  img.src = src;
  img.onload = ()=>success(src);
}

// LOAD GROUP FIRST (NO WAITING SYSTEM)
tryLoad(`images/${folderId}/group.JPG`, (src)=>{
  initGallery(src);
});

tryLoad(`images/${folderId}/group.jpg`, (src)=>{
  if(images.length===0) initGallery(src);
});

function initGallery(first){
  images.push(first);
  captions.push("The first page of our wonderful school life");
  showPhoto();

  // LOAD SINGLE IMAGES IN BACKGROUND
  let i=1;
  function loadNext(){
    tryLoad(`images/${folderId}/single${i}.JPG`, (src)=>{
      images.push(src);
      captions.push("A beautiful start to a bright journey");
      i++; loadNext();
    });

    tryLoad(`images/${folderId}/single${i}.jpg`, (src)=>{
      images.push(src);
      captions.push("A beautiful start to a bright journey");
      i++; loadNext();
    });
  }
  loadNext();
}

function showPhoto(){
  if(images.length===0) return;
  photo.src = images[currentIndex];
  caption.innerText = captions[currentIndex];
  downloadBtn.href = images[currentIndex];
  prevBtn.disabled = currentIndex===0;
  nextBtn.disabled = currentIndex===images.length-1;
}

function nextPhoto(){ if(currentIndex<images.length-1){currentIndex++;showPhoto();}}
function prevPhoto(){ if(currentIndex>0){currentIndex--;showPhoto();}}
</script>

</body>
</html>
