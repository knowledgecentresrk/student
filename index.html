<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Student Profile | Congratulations</title>
  <style>
    /* Reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #0b0f2a 0%, #1a1f3a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* Canvas for star sprinkles (positioned behind card) */
    #starsCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* so clicks pass through to the card */
      z-index: 1;
    }

    /* Main card – glassmorphism style */
    .card {
      position: relative;
      z-index: 2;
      max-width: 420px;
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 40px;
      box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      overflow: hidden;
      transition: transform 0.2s ease;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Header with gradient and shine */
    .header {
      background: linear-gradient(90deg, #ff8a5c, #ff4d6d, #b5179e);
      padding: 24px 20px 20px;
      text-align: center;
      position: relative;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      color: white;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
      margin-bottom: 4px;
    }
    .congrats {
      font-size: 20px;
      font-weight: 500;
      color: rgba(255,255,255,0.95);
      background: rgba(255,255,255,0.15);
      display: inline-block;
      padding: 8px 22px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.3);
      margin-top: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* Photo container */
    .photo-container {
      background: rgba(0, 0, 0, 0.2);
      margin: 24px 20px 12px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1) inset;
      aspect-ratio: 1 / 1.1; /* nice portrait ratio */
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .photo-placeholder {
      color: rgba(255,255,255,0.7);
      font-size: 18px;
      text-align: center;
      padding: 40px;
    }

    /* Student details */
    .name {
      font-size: 30px;
      font-weight: 800;
      text-align: center;
      margin: 8px 20px 4px;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      word-break: break-word;
    }
    .message {
      font-size: 20px;
      text-align: center;
      margin: 0 20px 24px;
      color: rgba(255,255,255,0.9);
      font-weight: 400;
      line-height: 1.5;
      background: rgba(255,255,255,0.1);
      padding: 18px 16px;
      border-radius: 30px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.15);
      word-break: break-word;
    }
    .footer {
      font-size: 16px;
      text-align: center;
      color: rgba(255,255,255,0.5);
      padding: 0 20px 24px;
      letter-spacing: 0.5px;
    }

    /* Loading & error states */
    .loading, .error {
      color: white;
      text-align: center;
      padding: 50px 20px;
      font-size: 18px;
      background: rgba(0,0,0,0.3);
      border-radius: 30px;
      margin: 20px;
    }
    .error {
      color: #ffb3b3;
    }
  </style>
</head>
<body>

  <!-- Canvas for star sprinkles (animated) -->
  <canvas id="starsCanvas"></canvas>

  <!-- Main profile card -->
  <div class="card">
    <div class="header">
      <h1>🎓 STUDENT PROFILE</h1>
      <div class="congrats">✨ Congratulations! ✨</div>
    </div>

    <div id="content">
      <!-- Dynamic content loaded by JavaScript -->
      <div class="loading">Loading student profile...</div>
    </div>
  </div>

  <script>
    // ==================== STARS SPRINKLE ANIMATION ====================
    (function() {
      const canvas = document.getElementById('starsCanvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let particles = [];

      function initCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        // Create 80–100 stars with random positions
        const count = Math.floor(width * height / 8000); // about 80–120 stars
        particles = [];
        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 2.5 + 1.2, // star size
            speed: Math.random() * 0.5 + 0.2,  // falling speed
            alpha: Math.random() * 0.7 + 0.3,  // opacity
            color: `hsl(${Math.random() * 60 + 20}, 80%, 70%)` // warm yellowish/white
          });
        }
      }

      function drawStars() {
        ctx.clearRect(0, 0, width, height);
        ctx.globalCompositeOperation = 'lighter'; // makes stars glow

        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.alpha;
          ctx.fill();

          // Add a tiny glow
          ctx.shadowColor = 'white';
          ctx.shadowBlur = 6;
          ctx.fill();
          ctx.shadowBlur = 0; // reset for next
        });

        // Move stars down (falling effect)
        particles.forEach(p => {
          p.y += p.speed;
          // Reset when out of view
          if (p.y > height) {
            p.y = 0;
            p.x = Math.random() * width;
          }
        });

        requestAnimationFrame(drawStars);
      }

      window.addEventListener('resize', () => {
        initCanvas();
      });

      initCanvas();
      drawStars();
    })();

    // ==================== STUDENT DATA LOADING ====================
    (function() {
      const studentId = new URLSearchParams(window.location.search).get('id');
      const contentDiv = document.getElementById('content');

      if (!studentId) {
        contentDiv.innerHTML = '<div class="error">❌ Missing student ID</div>';
        return;
      }

      // Fetch the JSON file (adjust path if needed)
      fetch('data/student.json')
        .then(response => {
          if (!response.ok) throw new Error('Network response was not ok');
          return response.json();
        })
        .then(students => {
          // Find student by ID (assuming key "A" matches your JSON)
          const student = students.find(s => s.A == studentId);
          if (!student) throw new Error('Student not found');

          // Build the basic structure with name and message
          contentDiv.innerHTML = `
            <div class="photo-container" id="photoContainer">
              <div class="loading" style="background: none; color: #ccc;">✨ Loading photo ✨</div>
            </div>
            <div class="name">${student.B || '✨ Student ✨'}</div>
            <div class="message">${student.C || '🎉 Congratulations! 🎉'}</div>
            <div class="footer">ID: ${studentId}</div>
          `;

          // Try loading image with different extensions (prioritize .JPG as per user)
          const extensions = ['JPG', 'jpg', 'PNG', 'png'];
          const photoContainer = document.getElementById('photoContainer');

          function tryImage(ext) {
            return new Promise((resolve, reject) => {
              const img = new Image();
              img.onload = () => resolve(img);
              img.onerror = reject;
              img.src = `images/${studentId}.${ext}`;
            });
          }

          // Try extensions in order
          let attempt = Promise.reject();
          extensions.forEach(ext => {
            attempt = attempt.catch(() => tryImage(ext));
          });

          attempt
            .then(img => {
              img.className = 'photo';
              photoContainer.innerHTML = ''; // clear loading
              photoContainer.appendChild(img);
            })
            .catch(() => {
              photoContainer.innerHTML = '<div class="photo-placeholder">📷 No photo available</div>';
            });
        })
        .catch(err => {
          console.error(err);
          contentDiv.innerHTML = '<div class="error">❌ Student not found or data error</div>';
        });
    })();
  </script>
</body>
</html>
