<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My First Day</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;text-align:center;overflow:hidden
}

canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.main{position:relative;z-index:2;padding:15px}

h1{font-size:clamp(20px,5vw,30px);animation:glow 2s infinite alternate}
h2{font-size:clamp(16px,4vw,22px);color:#ffd700}

@keyframes glow{from{text-shadow:0 0 10px #fff}to{text-shadow:0 0 25px #00e6ff}}

.card{
  margin-top:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  border-radius:15px;
  padding:10px;
  max-width:95%;
  margin:auto;
}

.img-wrapper{position:relative;overflow:hidden;border-radius:12px}

img{
  width:100%;
  max-height:80vh;
  object-fit:contain;
  background:#000
}

/* loader */
#imgLoader{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:#000;z-index:2
}
.spinner{
  width:40px;height:40px;
  border:4px solid rgba(255,255,255,0.3);
  border-top:4px solid #fff;
  border-radius:50%;
  animation:spin 1s linear infinite
}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

/* shine */
.shine{
  position:absolute;top:0;left:-75%;
  width:50%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);
  transform:skewX(-25deg);
  animation:shine 3s infinite;
}
@keyframes shine{0%{left:-75%}100%{left:125%}}

.caption{
  margin-top:10px;
  font-size:clamp(18px,4.5vw,26px);
  font-weight:600
}

button,a{
  padding:10px;margin:5px;border:none;border-radius:8px;
  background:linear-gradient(45deg,#ff512f,#dd2476);
  color:#fff;text-decoration:none
}
button:disabled{opacity:0.4}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="main">
<h1>The Indian Heights School</h1>
<h2>My First Day</h2>

<div class="card">
  <div class="img-wrapper">
    <div id="imgLoader"><div class="spinner"></div></div>
    <div class="shine"></div>
    <img id="photo" />
  </div>

  <div class="caption" id="caption"></div>

  <div>
    <button id="prevBtn" onclick="prevPhoto()">Prev</button>
    <button id="nextBtn" onclick="nextPhoto()">Next</button><br>
    <a id="downloadBtn" download>Download</a>
  </div>
</div>
</div>

<script>
const folderId = new URLSearchParams(window.location.search).get('id') || '1';

let images = [];
let captions = [];
let currentIndex = 0;

// load first single image
function loadFirst(){
  const img = new Image();
  img.src = `images/${folderId}/single1.JPG`;

  img.onload = () => {
    images.push(img.src);
    captions.push("A beautiful start to a bright journey");
    showPhoto();
    loadSingles(2);
  };

  img.onerror = () => {
    loadGroup();
  };
}

function loadSingles(i){
  const img = new Image();
  img.src = `images/${folderId}/single${i}.JPG`;

  img.onload = () => {
    images.push(img.src);
    captions.push("A beautiful start to a bright journey");
    loadSingles(i+1);
  };

  img.onerror = () => {
    loadGroup(); // after singles, load group
  };
}

function loadGroup(){
  const img = new Image();
  img.src = `images/${folderId}/group.JPG`;

  img.onload = () => {
    images.push(img.src);
    captions.push("The first page of our wonderful school life");
  };
}

function showPhoto(){
  if(images.length===0) return;

  const loader = document.getElementById('imgLoader');
  loader.style.display = 'flex';

  photo.onload = ()=>{ loader.style.display='none'; };

  photo.src = images[currentIndex];
  caption.innerText = captions[currentIndex];
  downloadBtn.href = images[currentIndex];

  prevBtn.disabled = currentIndex===0;
  nextBtn.disabled = currentIndex===images.length-1;
}

function nextPhoto(){ if(currentIndex<images.length-1){currentIndex++;showPhoto();}}
function prevPhoto(){ if(currentIndex>0){currentIndex--;showPhoto();}}

loadFirst();

// stars
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars=[];
for(let i=0;i<120;i++){
  stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2,s:Math.random()*1+0.3});
}

function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  stars.forEach(star=>{
    ctx.beginPath();
    ctx.arc(star.x,star.y,star.r,0,Math.PI*2);
    ctx.fill();

    star.y+=star.s;
    if(star.y>canvas.height){
      star.y=0;
      star.x=Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(drawStars);
}
drawStars();
</script>

</body>
</html>
