<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>The Indian Heights School – Scholar Profile</title>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #fef9e7;  /* soft cream */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle diagonal pattern overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(45deg, rgba(230, 180, 34, 0.02) 0px, rgba(230, 180, 34, 0.02) 20px, transparent 20px, transparent 40px);
      pointer-events: none;
      z-index: 1;
    }

    /* Canvas for stars and sparkles (lightweight animation) */
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      opacity: 0.6;
    }

    /* Main card – deep emerald, layered shadow, soft corners */
    .card {
      position: relative;
      z-index: 10;
      max-width: 420px;
      width: 100%;
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 25px 40px -12px rgba(10, 60, 50, 0.3),
                  0 10px 20px -8px rgba(0, 0, 0, 0.15),
                  0 0 0 1px rgba(230, 180, 34, 0.3) inset;
      overflow: hidden;
      animation: fadeUp 0.5s ease;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: scale(1.01);
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* School header – deep emerald */
    .school-header {
      background: #0a3b3a;  /* deep emerald */
      color: white;
      padding: 24px 20px 18px;
      text-align: center;
      border-bottom: 4px solid #e6b422; /* warm peach */
    }

    .school-name {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .school-address {
      font-size: 13px;
      font-weight: 300;
      color: #f7d9a0;
      letter-spacing: 0.3px;
    }

    /* "Hat and Sash" ribbon – enhanced with 3D fold */
    .ribbon {
      background: linear-gradient(145deg, #f7e5b9, #e6b422);
      padding: 12px 16px;
      text-align: center;
      position: relative;
      border-bottom: 2px solid #e6b422;
      border-top: 2px solid #e6b42220;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }
    .ribbon::before {
      content: '';
      position: absolute;
      top: -5px;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(135deg, transparent 30%, #e6b422 50%, transparent 70%);
      opacity: 0.4;
    }
    .ribbon span {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      color: #0a3b3a;
      background: rgba(255,255,240,0.5);
      padding: 5px 28px;
      border-radius: 40px;
      letter-spacing: 1px;
      display: inline-block;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      backdrop-filter: blur(2px);
    }
    .ribbon span::before {
      content: "🎓 ";
      font-size: 22px;
      filter: drop-shadow(0 2px 2px #e6b422);
    }
    .ribbon span::after {
      content: " 🎓";
      font-size: 22px;
      filter: drop-shadow(0 2px 2px #e6b422);
    }

    /* Photo container – beautiful frame */
    .photo-container {
      margin: 18px 22px 10px;
      border-radius: 20px;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 12px 22px -10px rgba(10, 60, 50, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      max-height: 48vh;
      border: 6px solid #ffffff;
      outline: 2px solid #e6b422;  /* gold frame */
      outline-offset: 2px;
      position: relative;
    }
    /* Decorative corner accents (optional) */
    .photo-container::before,
    .photo-container::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid #e6b422;
      pointer-events: none;
      z-index: 5;
    }
    .photo-container::before {
      top: -4px;
      left: -4px;
      border-right: none;
      border-bottom: none;
    }
    .photo-container::after {
      bottom: -4px;
      right: -4px;
      border-left: none;
      border-top: none;
    }

    .photo {
      width: 100%;
      height: auto;
      max-height: 48vh;
      object-fit: contain;
      display: block;
    }

    .photo-placeholder {
      color: #7a6a52;
      padding: 40px 16px;
      text-align: center;
      font-size: 16px;
    }

    /* Student details – elegant spacing */
    .student-name {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 700;
      text-align: center;
      margin: 8px 22px 2px;
      color: #0a3b3a;
      word-break: break-word;
      line-height: 1.2;
    }

    .student-message {
      font-size: 18px;
      text-align: center;
      margin: 0 22px 18px;
      color: #2c3e4f;
      background: #f8f4ec;
      padding: 14px 16px;
      border-radius: 50px;
      border-left: 4px solid #e6b422;
      border-right: 4px solid #e6b422;
      font-weight: 400;
      word-break: break-word;
      line-height: 1.5;
    }

    /* Download button – premium gold */
    .download-btn {
      display: block;
      width: calc(100% - 44px);
      margin: 0 22px 18px;
      padding: 16px 10px;
      background: linear-gradient(145deg, #e6b422, #d19b1a);
      border: none;
      border-radius: 50px;
      color: #0a3b3a;
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      box-shadow: 0 10px 16px -6px #b38a2d80, 0 2px 0 0 #f7e5b9 inset;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      border: none;
      letter-spacing: 0.5px;
    }
    .download-btn:active {
      transform: scale(0.98);
      box-shadow: 0 5px 10px -3px #8f6f2d;
    }
    /* Icon via pseudo-element */
    .download-btn::before {
      content: "⬇️ ";
      font-size: 22px;
      margin-right: 6px;
    }

    .footer {
      font-size: 13px;
      text-align: center;
      color: #8f9bae;
      padding: 0 22px 22px;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    /* Loading / error states */
    .loading, .error {
      text-align: center;
      padding: 40px 16px;
      color: #0a3b3a;
      font-size: 16px;
    }
    .error { color: #b34a4a; }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div class="card">
    <!-- School header -->
    <div class="school-header">
      <div class="school-name">The Indian Heights School</div>
      <div class="school-address">Sector - 23, Dwarka, New Delhi 110077</div>
    </div>

    <!-- Hat & Sash ribbon (enhanced) -->
    <div class="ribbon">
      <span>Hat and Sash</span>
    </div>

    <!-- Dynamic content -->
    <div id="content">
      <div class="loading">🌟 Loading profile...</div>
    </div>
  </div>

  <script>
    // ==================== LIGHTWEIGHT STARS & SPARKLES ====================
    (function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let particles = [];

      function initParticles() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        // Approximately 100 particles – mix of falling stars and twinkling sparkles
        const total = Math.min(100, Math.floor((width * height) / 7000));
        particles = [];
        for (let i = 0; i < total; i++) {
          const isStar = Math.random() < 0.7; // 70% stars, 30% sparkles
          particles.push({
            type: isStar ? 'star' : 'sparkle',
            x: Math.random() * width,
            y: Math.random() * height,
            radius: isStar ? Math.random() * 2.5 + 1 : Math.random() * 4 + 2,
            speedY: isStar ? Math.random() * 0.4 + 0.15 : 0,
            speedX: isStar ? (Math.random() - 0.5) * 0.1 : (Math.random() - 0.5) * 0.05,
            alpha: Math.random() * 0.5 + 0.3,
            flicker: Math.random() * 0.02 + 0.005,
            color: isStar 
              ? `hsl(${45 + Math.random()*20}, 80%, 70%)`   // warm gold
              : `hsl(${50 + Math.random()*30}, 90%, 75%)`,  // brighter sparkles
          });
        }
      }

      function drawParticles() {
        ctx.clearRect(0, 0, width, height);
        ctx.shadowColor = '#fffacd';
        ctx.shadowBlur = 8;

        particles.forEach(p => {
          // Twinkling alpha
          const twinkle = Math.sin(Date.now() * p.flicker + p.x) * 0.15;
          ctx.globalAlpha = Math.min(1, Math.max(0.2, p.alpha + twinkle));
          ctx.fillStyle = p.color;

          if (p.type === 'sparkle') {
            // Draw sparkle as a small star (+ shape)
            ctx.beginPath();
            for (let i = 0; i < 4; i++) {
              let angle = i * Math.PI/2;
              let dx = Math.cos(angle) * p.radius * 1.5;
              let dy = Math.sin(angle) * p.radius * 1.5;
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(p.x + dx, p.y + dy);
            }
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 1.2;
            ctx.stroke();
            // Center dot
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius * 0.6, 0, Math.PI * 2);
            ctx.fill();
          } else {
            // Star – simple circle
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
          }

          // Move stars downward, sparkles drift slowly
          p.y += p.speedY;
          p.x += p.speedX;

          // Wrap around edges
          if (p.y > height) p.y = 0;
          if (p.y < 0) p.y = height;
          if (p.x > width) p.x = 0;
          if (p.x < 0) p.x = width;
        });

        ctx.shadowBlur = 0;
        requestAnimationFrame(drawParticles);
      }

      window.addEventListener('resize', () => {
        initParticles();
      });

      initParticles();
      drawParticles();
    })();

    // ==================== STUDENT DATA LOADING ====================
    (function() {
      const studentId = new URLSearchParams(window.location.search).get('id');
      const contentDiv = document.getElementById('content');

      if (!studentId) {
        contentDiv.innerHTML = '<div class="error">❌ Missing student ID</div>';
        return;
      }

      fetch('data/student.json')
        .then(r => r.json())
        .then(students => {
          const student = students.find(s => s.A == studentId);
          if (!student) throw new Error('Student not found');

          contentDiv.innerHTML = `
            <div class="photo-container" id="photoContainer">
              <div class="loading" style="background: none;">📸 Loading photo...</div>
            </div>
            <div class="student-name">${student.B || 'Scholar'}</div>
            <div class="student-message">${student.C || 'Congratulations on your achievement! 🎓'}</div>
            <button class="download-btn" id="downloadBtn" style="display: none;">Download Photo</button>
            <div class="footer">ID: ${studentId}</div>
          `;

          const photoContainer = document.getElementById('photoContainer');
          const downloadBtn = document.getElementById('downloadBtn');
          const extensions = ['JPG', 'jpg', 'PNG', 'png'];
          let loadedImageSrc = null;

          function tryImage(ext) {
            return new Promise((resolve, reject) => {
              const img = new Image();
              img.onload = () => {
                loadedImageSrc = img.src;
                resolve(img);
              };
              img.onerror = reject;
              img.src = `images/${studentId}.${ext}`;
            });
          }

          let attempt = Promise.reject();
          extensions.forEach(ext => {
            attempt = attempt.catch(() => tryImage(ext));
          });

          attempt
            .then(img => {
              img.className = 'photo';
              photoContainer.innerHTML = '';
              photoContainer.appendChild(img);
              downloadBtn.style.display = 'block';
            })
            .catch(() => {
              photoContainer.innerHTML = '<div class="photo-placeholder">📷 No photo available</div>';
              downloadBtn.style.display = 'none';
            });

          downloadBtn.addEventListener('click', function() {
            if (loadedImageSrc) {
              const a = document.createElement('a');
              a.href = loadedImageSrc;
              a.download = `${studentId}_profile.jpg`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
            } else {
              alert('Photo not ready.');
            }
          });
        })
        .catch(err => {
          console.error(err);
          contentDiv.innerHTML = '<div class="error">❌ Student not found</div>';
        });
    })();
  </script>
</body>
</html>
