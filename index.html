<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Profile</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .header {
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: white;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
    }
    .photo-container {
      background: #f0f0f0;
      text-align: center;
      min-height: 250px;
    }
    .photo {
      max-width: 100%;
      max-height: 400px;
      object-fit: contain;
    }
    .photo-placeholder {
      padding: 40px;
      color: #999;
    }
    .name {
      font-size: 26px;
      font-weight: bold;
      margin: 16px;
      color: #222;
    }
    .message {
      font-size: 18px;
      padding: 0 20px 20px;
      color: #555;
    }
    .footer {
      font-size: 14px;
      color: #aaa;
      text-align: center;
      padding: 0 20px 20px;
    }
    .error, .loading {
      text-align: center;
      padding: 40px;
    }
    .error { color: #e74c3c; }
    .loading { color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">🎓 STUDENT PROFILE</div>
    <div id="content">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <script>
    const studentId = new URLSearchParams(window.location.search).get('id');
    if (!studentId) {
      document.getElementById('content').innerHTML = '<div class="error">Missing ID</div>';
    } else {
      fetch('data/student.json')
        .then(r => r.json())
        .then(students => {
          const student = students.find(s => s.A == studentId);
          if (!student) throw new Error('Not found');
          document.getElementById('content').innerHTML = `
            <div class="photo-container">
              <img src="images/${studentId}.jpg" class="photo" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'photo-placeholder\\'>📷 No photo</div>';">
            </div>
            <div class="name">${student.B}</div>
            <div class="message">${student.C}</div>
            <div class="footer">ID: ${studentId}</div>
          `;
        })
        .catch(err => {
          document.getElementById('content').innerHTML = '<div class="error">Student not found</div>';
        });
    }
  </script>
</body>
</html>
