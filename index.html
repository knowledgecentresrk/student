<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Profile</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .header {
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: white;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
    }
    .photo-container {
      background: #f0f0f0;
      text-align: center;
      min-height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo {
      max-width: 100%;
      max-height: 400px;
      object-fit: contain;
    }
    .photo-placeholder {
      padding: 40px;
      color: #999;
    }
    .name {
      font-size: 26px;
      font-weight: bold;
      margin: 16px;
      color: #222;
    }
    .message {
      font-size: 18px;
      padding: 0 20px 20px;
      color: #555;
    }
    .footer {
      font-size: 14px;
      color: #aaa;
      text-align: center;
      padding: 0 20px 20px;
    }
    .error, .loading {
      text-align: center;
      padding: 40px;
    }
    .error { color: #e74c3c; }
    .loading { color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">🎓 STUDENT PROFILE</div>
    <div id="content">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <script>
    const studentId = new URLSearchParams(window.location.search).get('id');
    if (!studentId) {
      document.getElementById('content').innerHTML = '<div class="error">Missing ID</div>';
    } else {
      fetch('data/student.json')
        .then(r => r.json())
        .then(students => {
          const student = students.find(s => s.A == studentId);
          if (!student) throw new Error('Not found');
          
          // Create the HTML structure first
          const contentDiv = document.getElementById('content');
          contentDiv.innerHTML = `
            <div class="photo-container" id="photoContainer">
              <div class="loading">Loading photo...</div>
            </div>
            <div class="name">${student.B || 'Unknown'}</div>
            <div class="message">${student.C || ''}</div>
            <div class="footer">ID: ${studentId}</div>
          `;

          // Function to try loading image with different extensions
          const tryImage = (ext) => {
            return new Promise((resolve, reject) => {
              const img = new Image();
              img.onload = () => resolve(img);
              img.onerror = reject;
              img.src = `images/${studentId}.${ext}`;
            });
          };

          // List of extensions to try in order
const extensions = ['jpg', 'JPG', 'png', 'PNG'];

// Function to try loading with a given extension
const tryImage = (ext) => {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = `images/${studentId}.${ext}`;
  });
};

// Try each extension in sequence
let promise = Promise.reject();
extensions.forEach(ext => {
  promise = promise.catch(() => tryImage(ext));
});

promise
  .then(img => {
    // Success with some extension
    document.getElementById('photoContainer').innerHTML = '';
    document.getElementById('photoContainer').appendChild(img);
    img.className = 'photo';
  })
  .catch(() => {
    // All extensions failed
    document.getElementById('photoContainer').innerHTML = '<div class="photo-placeholder">📷 No photo</div>';
  });
  </script>
</body>
</html>
